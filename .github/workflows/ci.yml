name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '.'
          shared-key: orca-ci

      - name: Install npm dependencies
        run: npm ci

      - name: Run TypeScript type check (client)
        run: npm run build --workspace=packages/client -- --noEmit

      - name: Run TypeScript type check (server)
        run: npm run build --workspace=packages/server -- --noEmit

      - name: Run Rust fmt check
        run: cargo fmt -- --check

      - name: Run Rust clippy
        run: cargo clippy --workspace -- -D warnings

  test-node:
    name: Test Node.js packages
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Test client package
        run: npm run test --workspace=packages/client
        env:
          NODE_ENV: test

      - name: Test server package
        run: npm run test --workspace=packages/server
        env:
          NODE_ENV: test

      - name: Upload client coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./packages/client/coverage/lcov.info
          flags: client
          name: client-coverage
          fail_ci_if_error: false

      - name: Upload server coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./packages/server/coverage/lcov.info
          flags: server
          name: server-coverage
          fail_ci_if_error: false

  test-rust:
    name: Test Rust packages
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '.'
          shared-key: orca-ci

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Rust tests with coverage
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --workspace --out Xml --output-dir ./coverage
        continue-on-error: true

      - name: Upload Rust coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/cobertura.xml
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false

  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '.'
          shared-key: orca-ci

      - name: Install npm dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Build server (TypeScript)
        run: npm run build:server:node

      - name: Build harness-headless
        run: npm run build --workspace=packages/harness-headless

      - name: Build Rust server
        run: cargo build -p agent-canvas-server --release

      - name: Build daemon and CLI
        run: cargo build -p orca-daemon -p orca-cli --release

      - name: Upload client build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: packages/client/dist
          retention-days: 30

      - name: Upload server build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: packages/server/dist
          retention-days: 30

      - name: Upload harness-headless build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harness-headless-dist
          path: packages/harness-headless/dist
          retention-days: 30

      - name: Upload Rust binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: |
            target/release/agent-canvas-server
            target/release/orca-daemon
            target/release/orca-cli
          retention-days: 30

  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports have been uploaded to Codecov." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage is tracked across three components:" >> $GITHUB_STEP_SUMMARY
          echo "- Client (React/TypeScript)" >> $GITHUB_STEP_SUMMARY
          echo "- Server (Node/TypeScript)" >> $GITHUB_STEP_SUMMARY
          echo "- Rust (Tauri daemon, CLI, server)" >> $GITHUB_STEP_SUMMARY

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint, test-node, test-rust, build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test-node.result }}" != "success" ] || \
             [ "${{ needs.test-rust.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All CI checks passed"
