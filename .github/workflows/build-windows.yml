# Builds Orca Coder (Tauri) on Windows and uploads NSIS setup + MSI artifacts.
# Triggers: manual, version tags (v*). Re-enable `push: branches: [main]` for per-commit installers.

name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional note (does not bump app version; tag v* for releases)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '.'
          shared-key: orca-tauri-windows

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (before Tauri bundle)
        run: npm run build:client

      - name: Build harness-headless + orca CLI binaries
        run: npm run build --workspace=packages/harness-headless && cargo build -p orca-daemon -p orca-cli --release

      - name: Build Tauri Windows bundles (NSIS + MSI)
        run: npm run tauri:build

      - name: List bundle output (debug)
        shell: pwsh
        run: |
          if (Test-Path target/release/bundle) {
            Get-ChildItem -Path target/release/bundle -Recurse -File | Select-Object FullName, Length
          } else {
            Write-Warning "target/release/bundle missing"
          }

      - name: Upload Windows installers (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: orca-coder-windows-${{ github.sha }}
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 60

      - name: Upload to GitHub Release (tags only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
